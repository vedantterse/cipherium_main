version: "3.8"

services:
  cipherium:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - cipherium-data:/app/data
      - cipherium-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cipherium-data:
    driver: local
  cipherium-uploads:
    driver: local
