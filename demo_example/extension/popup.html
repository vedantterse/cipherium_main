<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      width:260px;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0a0a0f;color:#e4e4ef;padding:1.25rem;
    }
    .logo{
      font-size:1.15rem;font-weight:700;letter-spacing:-.01em;
      background:linear-gradient(135deg,#a29bfe,#6c5ce7);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-align:center;margin-bottom:.35rem;
    }
    .tagline{
      text-align:center;font-size:.7rem;color:#9595a8;margin-bottom:1.15rem;
    }
    .btn{
      width:100%;padding:.7rem;border:none;border-radius:8px;
      background:#6c5ce7;color:#fff;font-size:.85rem;font-weight:600;
      cursor:pointer;transition:background .2s;display:flex;
      align-items:center;justify-content:center;gap:.45rem;
    }
    .btn:hover{background:#5b4bd5}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .status{
      text-align:center;font-size:.7rem;color:#9595a8;
      margin-top:.6rem;min-height:1em;
    }
  </style>
</head>
<body>
  <div class="logo">Cipherium</div>
  <p class="tagline">AI Phishing Detection</p>
  <button class="btn" id="captureBtn">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
    Capture &amp; Analyze
  </button>
  <p class="status" id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
